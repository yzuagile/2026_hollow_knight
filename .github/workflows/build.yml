name: Build Game

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.jobType == 'editmode-tests' && 'EditMode Tests' || 'Build for Windows' }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      checks: write
    strategy:
      fail-fast: true
      matrix:
        jobType:
          - editmode-tests
          - build
        targetPlatform:
          - StandaloneWindows64
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-

      - name: Run EditMode tests
        if: matrix.jobType == 'editmode-tests'
        id: editmode-tests
        uses: game-ci/unity-test-runner@v5
        timeout-minutes: 20
        env:
          # 授權設定說明：
          # 1. Unity Personal (免費個人版): 建議使用 UNITY_LICENSE (將 .ulf 檔案內容存入 Secret)
          #    使用序列號 (UNITY_SERIAL) 登入個人版在 Unity 6 很容易因為網頁圖形驗證碼/2FA 而卡死。
          # 2. Unity Pro (專業版): 需使用 UNITY_SERIAL, UNITY_EMAIL, UNITY_PASSWORD
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          # UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          unityVersion: 6000.3.13f1
          testMode: EditMode
          artifactsPath: unity-test-results
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          checkName: EditMode Test Results
          runAsHostUser: true

      - name: Upload test results
        if: matrix.jobType == 'editmode-tests'
        uses: actions/upload-artifact@v4
        with:
          name: test-results-editmode
          path: ${{ steps.editmode-tests.outputs.artifactsPath }}

      - name: Reset test runner package changes
        if: matrix.jobType == 'editmode-tests'
        run: |
          sudo rm -rf unity-test-results
          git restore -- Packages/manifest.json Packages/packages-lock.json

      - name: Build project
        if: matrix.jobType == 'build'
        uses: game-ci/unity-builder@v5
        timeout-minutes: 30
        env:
          # 授權設定說明：
          # 1. Unity Personal (免費個人版): 建議使用 UNITY_LICENSE (將 .ulf 檔案內容存入 Secret)
          #    使用序列號 (UNITY_SERIAL) 登入個人版在 Unity 6 很容易因為網頁圖形驗證碼/2FA 而卡死。
          # 2. Unity Pro (專業版): 需使用 UNITY_SERIAL, UNITY_EMAIL, UNITY_PASSWORD
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          # UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          unityVersion: 6000.3.13f1
          targetPlatform: ${{ matrix.targetPlatform }}
          buildName: HollowKnightBuild

      - name: Upload build artifact
        if: matrix.jobType == 'build'
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.targetPlatform }}
          path: build/${{ matrix.targetPlatform }}

      - name: Send Slack Notification
        if: always()
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "Build Status: ${{ job.status }}",
              "attachments": [
                {
                  "color": "${{ job.status == 'success' && 'good' || 'danger' }}",
                  "fields": [
                    {
                      "title": "Repo",
                      "value": "${{ github.repository }}",
                      "short": true
                    },
                    {
                      "title": "Status",
                      "value": "${{ job.status }}",
                      "short": true
                    },
                    {
                      "title": "Triggered by",
                      "value": "${{ github.actor }}",
                      "short": true
                    }
                  ]
                }
              ]
            }
